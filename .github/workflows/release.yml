name: Build and release binary

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Version bump for the release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.0"
  RELEASE_BINARY: "alfredo-linux-x64"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: bun test

  prepare_release:
    name: Prepare release version
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          bump="${{ inputs.version }}"
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -n "$latest_tag" ]; then
            base_version="${latest_tag#v}"
          else
            base_version="$(python3 -c 'import json; print(json.load(open("package.json"))["version"])')"
          fi

          IFS='.' read -r major minor patch <<< "$base_version"

          case "$bump" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            *)
              echo "Unsupported version bump: $bump" >&2
              exit 1
              ;;
          esac

          version="${major}.${minor}.${patch}"
          tag="v${version}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build_binary:
    name: Build linux-x64 binary
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: bun run bin/compile.ts --target=linux-x64

      - name: Generate checksum
        run: sha256sum "dist/${{ env.RELEASE_BINARY }}" > "dist/${{ env.RELEASE_BINARY }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_BINARY }}
          path: |
            dist/${{ env.RELEASE_BINARY }}
            dist/${{ env.RELEASE_BINARY }}.sha256
          if-no-files-found: error

  create_tag:
    name: Create release tag
    if: github.event_name == 'workflow_dispatch'
    needs:
      - test
      - build_binary
      - prepare_release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.prepare_release.outputs.tag }}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag" "$GITHUB_SHA"
          git push origin "$tag"

  publish_release:
    name: Publish GitHub release
    if: github.event_name == 'workflow_dispatch'
    needs:
      - build_binary
      - create_tag
      - prepare_release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.RELEASE_BINARY }}
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          name: ${{ needs.prepare_release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/${{ env.RELEASE_BINARY }}
            dist/${{ env.RELEASE_BINARY }}.sha256
