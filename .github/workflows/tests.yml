name: Run tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.0"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: bun test
