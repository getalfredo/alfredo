name: Build and release binary

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.0"
  RELEASE_BINARY: "alfredo-linux-x64"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: bun test

  build_binary:
    name: Build linux-x64 binary
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: bun run scripts/compile.ts --target=linux-x64

      - name: Generate checksum
        run: sha256sum "dist/${{ env.RELEASE_BINARY }}" > "dist/${{ env.RELEASE_BINARY }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_BINARY }}
          path: |
            dist/${{ env.RELEASE_BINARY }}
            dist/${{ env.RELEASE_BINARY }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/${{ env.RELEASE_BINARY }}
            dist/${{ env.RELEASE_BINARY }}.sha256
